version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DATABASE_PATH=/data/app.db
      - LOG_LEVEL=Debug
    volumes:
      - ./:/app
      - crud-data:/data
    ports:
      - "5000:5000"
      - "5001:5001"  # Debug port
    restart: unless-stopped
    networks:
      - crud-network

  # Optional: Add database service for development
  # db:
  #   image: postgres:13-alpine
  #   environment:
  #     - POSTGRES_DB=crud_generator
  #     - POSTGRES_USER=developer
  #     - POSTGRES_PASSWORD=dev_password
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - crud-network
  #   ports:
  #     - "5432:5432"

volumes:
  crud-data:
    driver: local

networks:
  crud-network:
    driver: bridge