version: '3.8'
services:
  app:
    build: .
    container_name: dotnet-crud-generator
    environment:
      - DATABASE_PATH=/data/app.db
      - LOG_LEVEL=Information
    volumes:
      - crud-data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - crud-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  crud-data:
    driver: local

networks:
  crud-network:
    driver: bridge
